<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        .order-status-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            border: 1px solid #ccc;
            background: #fff;
            cursor: pointer;
        }
        .tab.active {
            background: #007bff;
            color: white;
        }
        .order-card {
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 10px;
            background: #f9f9f9;
        }
    </style>
</head>
<body>
    <div class="track-order-container">
        <h1>Track Your Order</h1>
        <div class="order-status-tabs">
            <button class="tab" data-status="all">All</button>
            <button class="tab" data-status="unpaid">Unpaid</button>
            <button class="tab" data-status="to-ship">To Ship</button>
            <button class="tab" data-status="shipping">Shipping</button>
            <button class="tab" data-status="completed">Completed</button>
            <button class="tab" data-status="cancellation">Cancellation</button>
            <button class="tab" data-status="return-refund">Return/Refund</button>
        </div>
        <div id="order-list">
            <!-- Orders will be dynamically loaded here -->
        </div>
    </div>
    <script src="/static/js/track_order.js"></script>
</body>
</html>
